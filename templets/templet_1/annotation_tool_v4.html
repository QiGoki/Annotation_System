                const imgHeight = imagePreview.naturalHeight;

                x1 = Math.max(0, Math.min(x1, imgWidth - 1));
                y1 = Math.max(0, Math.min(y1, imgHeight - 1));
                x2 = Math.max(1, Math.min(x2, imgWidth));
                y2 = Math.max(1, Math.min(y2, imgHeight));

                // 确保 x2 > x1, y2 > y1
                if (x2 <= x1) x2 = x1 + 1;
                if (y2 <= y1) y2 = y1 + 1;

                selectedComponent.component.bbox = [x1, y1, x2, y2];
                saveModification('bbox', [x1, y1, x2, y2]);

                // 更新坐标输入框
                const inputs = validationContent.querySelectorAll('.coord-inputs input');
                if (inputs.length === 4) {
                    inputs[0].value = x1;
                    inputs[1].value = y1;
                    inputs[2].value = x2;
                    inputs[3].value = y2;
                }
            }

            isResizing = false;
            isDragging = false;
            hasDragStarted = false;
            resizeHandle = null;
            currentOverlay = null;
            document.removeEventListener('mousemove', handleBboxMousemove);
            document.removeEventListener('mouseup', handleBboxMouseup);
        }

        // ========== 保存功能 ==========
        let isSaving = false;

        function saveCurrent() {
            if (isSaving) return;
            isSaving = true;
            saveBtn.disabled = true;

            const state = getCurrentState();
            if (!state) return;

            // 捕获当前索引，防止异步回调中使用过期的值
            const indexToSave = state.currentIndex;
            const item = state.allData[indexToSave];

            // 应用所有修改
            for (const pathKey in state.componentModifications) {
                const path = pathKey.split('-').map(Number);
                const mods = state.componentModifications[pathKey];
                const comp = findComponent(item.components, path);
                if (comp) {
                    if (mods.bbox) comp.bbox = mods.bbox;
                    if (mods.type) comp.type = mods.type;
                    if (mods.text !== undefined) comp.text = mods.text;
                }
            }

            const itemToSave = { ...item, _index: indexToSave };
            const filenameToSave = currentFile;

            apiFetch(`/api/save?filename=${encodeURIComponent(filenameToSave)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(itemToSave)
            })
            .then(data => {
                if (data.success) {
                    // 验证：确保仍然在处理同一个文件
                    if (currentFile !== filenameToSave) {
                        console.warn('保存完成后发现文件已切换');
                        return;
                    }

                    showToast();

                    // 只有之前未保存过，才更新统计数据
                    if (!state.savedIndices.has(indexToSave)) {
                        state.savedIndices.add(indexToSave);
                        state.allData[indexToSave]._saved = true;
                        state.stats.completed++;
                        state.stats.remaining--;
                    }

                    renderSidebarLists();
                    updateSidebarStats();

                    // 只有当仍在同一条目时才更新状态
                    if (state.currentIndex === indexToSave) {
                        currentSaved = true;
                        updateStatusBadge();
                    }
                } else {
                    alert('保存失败：' + (data.error || '未知错误'));
                }
            })
            .catch(err => {
                console.error('保存异常:', err);
            })
            .finally(() => {
                isSaving = false;
                saveBtn.disabled = false;
            });
        }

        function nextItem() {
            if (isSaving) return;
            const state = getCurrentState();
            if (!state) return;

            // 找下一条未完成的项目
            let nextIndex = -1;
            for (let i = state.currentIndex + 1; i < state.allData.length; i++) {
                if (!state.allData[i]._saved) {
                    nextIndex = i;
                    break;
                }
            }
            if (nextIndex === -1) {
                // 没有未完成的项目了
                showCompleteToast();
                saveBtn.disabled = true;
                nextBtn.disabled = true;
            } else {
                state.currentIndex = nextIndex;
                loadCurrentItem();
                updateSidebarStats();
                updateActiveListItem();
            }
        }

        function saveCurrentAndNext() {
            if (isSaving) return;
            isSaving = true;
            saveBtn.disabled = true;

            const state = getCurrentState();
            if (!state) return;

            // 捕获当前索引，防止异步回调中使用过期的值
            const indexToSave = state.currentIndex;
            const item = state.allData[indexToSave];

            // 应用所有修改
            for (const pathKey in state.componentModifications) {
                const path = pathKey.split('-').map(Number);
                const mods = state.componentModifications[pathKey];
                const comp = findComponent(item.components, path);
                if (comp) {
                    if (mods.bbox) comp.bbox = mods.bbox;
                    if (mods.type) comp.type = mods.type;
                    if (mods.text !== undefined) comp.text = mods.text;
                }
            }

            const itemToSave = { ...item, _index: indexToSave };
            const filenameToSave = currentFile;

            apiFetch(`/api/save?filename=${encodeURIComponent(filenameToSave)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(itemToSave)
            })
            .then(data => {
                if (data.success) {
                    // 验证：确保仍然在处理同一个文件
                    if (currentFile !== filenameToSave) {
                        console.warn('保存完成后发现文件已切换');
                        return;
                    }

                    showToast();

                    // 只有之前未保存过，才更新统计数据
                    if (!state.savedIndices.has(indexToSave)) {
                        state.savedIndices.add(indexToSave);
                        state.allData[indexToSave]._saved = true;
                        state.stats.completed++;
                        state.stats.remaining--;
                    }

                    renderSidebarLists();
                    updateSidebarStats();

                    // 找下一条未完成
                    let nextIndex = -1;
                    for (let i = indexToSave + 1; i < state.allData.length; i++) {
                        if (!state.allData[i]._saved) {
                            nextIndex = i;
                            break;
                        }
                    }
                    if (nextIndex !== -1) {
                        state.currentIndex = nextIndex;
                        loadCurrentItem();
                    } else {
                        state.currentIndex++;
                        if (state.currentIndex >= state.allData.length) {
                            showCompleteToast();
                            saveBtn.disabled = true;
                            nextBtn.disabled = true;
                        } else {
                            loadCurrentItem();
                        }
                    }
                } else {
                    alert('保存失败：' + (data.error || '未知错误'));
                }
            })
            .catch(err => {
                console.error('保存异常:', err);
            })
            .finally(() => {
                isSaving = false;
                saveBtn.disabled = false;
            });
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showErrorToast(message) {
            const errorToast = document.getElementById('toast-error');
            errorToast.textContent = message;
            errorToast.classList.add('show');
            setTimeout(() => errorToast.classList.remove('show'), 3000);
        }

        function showCompleteToast() {
            loading.textContent = '🎉 已全部完成！';
            loading.classList.add('complete');
            loadingContainer.style.display = 'block';
        }

        // ========== 事件绑定 ==========
        saveBtn.addEventListener('click', saveCurrent);
        nextBtn.addEventListener('click', nextItem);
        prevBtn.addEventListener('click', () => {
            const state = getCurrentState();
            if (!state) return;
            if (state.currentIndex > 0) {
                state.currentIndex--;
                loadCurrentItem();
                updateSidebarStats();
                updateActiveListItem();
            }
        });

        // 添加根组件按钮
        document.getElementById('add-root-component-btn').addEventListener('click', addComponentAtRoot);

        // 提交按钮
        submitBtn.addEventListener('click', () => {
            if (!currentFile) return;

            apiFetch(`/api/submit?filename=${encodeURIComponent(currentFile)}`, {
                method: 'POST'
            })
            .then(data => {
                if (data.success) {
                    alert('✓ 文件已提交到 output 目录');
                    // 释放文件锁
                    releaseFileLock(currentFile);
                    lockedFiles.delete(currentFile);
                    currentFile = null;
                    // 刷新文件列表
                    loadFiles();
                } else {
                    alert('提交失败：' + data.error);
                }
            })
            .catch(err => {
                console.error('提交失败:', err);
                alert('提交失败：' + err.message);
            });
        });

        toggleAllBboxesBtn.addEventListener('click', function() {
            showAllBboxes = !showAllBboxes;
            this.textContent = showAllBboxes ? '隐藏全部' : '显示全部';

            // 点击"显示全部"时，清除组件树选中状态和调整手柄
            if (showAllBboxes) {
                selectedComponent = null;
                showResizeHandles = false;
                // 移除组件树的选中样式
                document.querySelectorAll('.tree-node.selected').forEach(node => {
                    node.classList.remove('selected');
                });
            }

            updateBboxVisibility();
            renderValidationPanel();
        });

        // 点击空白取消选中（放大模式下不响应）
        document.getElementById('image-container').addEventListener('click', function(e) {
            // 放大模式下不响应点击空白取消选择
            if (zoomMode) return;

            // 检查是否点击了 bbox 框（包括其子元素）
            if (e.target.closest('.bbox-overlay')) return;

            // 点击的是图片容器空白处
            // 第一次点击空白：取消显示调整手柄
            if (showResizeHandles) {
                showResizeHandles = false;
                updateBboxVisibility();
                return;
            }
            // 第二次点击空白：取消选择
            selectedComponent = null;
            updateBboxVisibility();
            renderValidationPanel();
        });

        // ========== 键盘方向键微调 bbox ==========
        document.addEventListener('keydown', function(e) {
            // 只有在有选中的组件且没有处于输入状态时才响应
            if (!selectedComponent) return;

            // 如果焦点在输入框或文本域中，不响应方向键
            const activeElement = document.activeElement;
            if (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA') {
                return;
            }

            const state = getCurrentState();
            if (!state) return;

            let moved = false;
            const step = 1;  // 每次移动 1 像素

            switch (e.key) {
                case 'ArrowUp':
                    if (selectedComponent.component.bbox[1] >= step) {
                        selectedComponent.component.bbox[1] -= step;
                        selectedComponent.component.bbox[3] -= step;
                        moved = true;
                    }
                    break;
                case 'ArrowDown':
                    const imgHeight = imagePreview.naturalHeight;
                    if (selectedComponent.component.bbox[3] < imgHeight) {
                        selectedComponent.component.bbox[1] += step;
                        selectedComponent.component.bbox[3] += step;
                        moved = true;
                    }
                    break;
                case 'ArrowLeft':
                    if (selectedComponent.component.bbox[0] >= step) {
                        selectedComponent.component.bbox[0] -= step;
                        selectedComponent.component.bbox[2] -= step;
                        moved = true;
                    }
                    break;
                case 'ArrowRight':
                    const imgWidth = imagePreview.naturalWidth;
                    if (selectedComponent.component.bbox[2] < imgWidth) {
                        selectedComponent.component.bbox[0] += step;
                        selectedComponent.component.bbox[2] += step;
                        moved = true;
                    }
                    break;
                default:
                    return;
            }

            if (moved) {
                e.preventDefault();
                e.stopPropagation();

                // 隐藏调整手柄
                showResizeHandles = false;
                updateBboxVisibility();

                // 更新 bbox 显示
                updateBboxDisplay();

                // 同步更新坐标输入框
                const inputs = validationContent.querySelectorAll('.coord-inputs input');
                if (inputs.length === 4) {
                    inputs[0].value = selectedComponent.component.bbox[0];
                    inputs[1].value = selectedComponent.component.bbox[1];
                    inputs[2].value = selectedComponent.component.bbox[2];
                    inputs[3].value = selectedComponent.component.bbox[3];
                }

                // 保存修改
                saveModification('bbox', selectedComponent.component.bbox);
            }
        });

        // ========== 图片缩放功能 ==========

        // 更新缩放变换
        function updateZoomTransform() {
            if (zoomLevel === 1) {
                imageCanvas.style.transform = 'translate(0px, 0px) scale(1)';
            } else {
                imageCanvas.style.transform = `translate(${imageTranslate.x}px, ${imageTranslate.y}px) scale(${zoomLevel})`;
            }
            zoomResetBtn.textContent = Math.round(zoomLevel * 100) + '%';
        }

        // 切换放大模式
        zoomBtn.addEventListener('click', function() {
            zoomMode = !zoomMode;
            if (zoomMode) {
                document.body.classList.add('zoom-mode');
                this.classList.add('active');
                this.textContent = '✕';
                this.title = '关闭放大模式';
            } else {
                document.body.classList.remove('zoom-mode');
                this.classList.remove('active');
                this.textContent = '🔍';
                this.title = '打开放大模式';
            }
            // 更新光标
            updateZoomCursor();
        });

        // 重置缩放
        zoomResetBtn.addEventListener('click', function() {
            zoomLevel = 1;
            imageTranslate = { x: 0, y: 0 };
            updateZoomTransform();
        });

        // 图片容器引用
        const imageContainer = document.getElementById('image-container');

        // 滚轮缩放 - 直接在 document 上监听，只要鼠标在图片容器上即可
        let isMouseOverImage = false;

        imageContainer.addEventListener('mouseenter', function() {
            isMouseOverImage = true;
        });

        imageContainer.addEventListener('mouseleave', function() {
            isMouseOverImage = false;
        });

        imageContainer.addEventListener('wheel', function(e) {
            if (!zoomMode || !isMouseOverImage) return;

            e.preventDefault();

            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const newZoom = Math.max(0.5, Math.min(5, zoomLevel + delta));

            if (newZoom !== zoomLevel) {
                zoomLevel = newZoom;
                updateZoomTransform();
            }
        }, { passive: false });

        // 在放大模式下，鼠标在图片上时显示 zoom-in 光标
        imageCanvas.addEventListener('mouseenter', function() {
            if (zoomMode && !isPanning) {
                this.classList.add('zoom-cursor');
            } else {
                this.classList.remove('zoom-cursor');
            }
        });

        imageCanvas.addEventListener('mouseleave', function() {
            // 鼠标离开图片时恢复默认光标
            this.classList.remove('zoom-cursor');
        });

        // 切换放大模式时更新光标
        function updateZoomCursor() {
            if (zoomMode && !isPanning) {
                imageCanvas.classList.add('zoom-cursor');
            } else {
                imageCanvas.classList.remove('zoom-cursor');
            }
        }

        imageCanvas.addEventListener('mousedown', function(e) {
            if (!zoomMode) return;
            // 只有在放大模式下才启用拖拽
            isPanning = true;
            panStart = { x: e.clientX - imageTranslate.x, y: e.clientY - imageTranslate.y };
            this.classList.add('grabbing-cursor');
            document.body.classList.add('zoom-dragging');
            e.preventDefault();
            e.stopPropagation();
            // 标记拖拽尚未开始
            hasPanned = false;
        });

        document.addEventListener('mousemove', function(e) {
            if (!isPanning) return;

            e.preventDefault();
            imageTranslate.x = e.clientX - panStart.x;
            imageTranslate.y = e.clientY - panStart.y;
            updateZoomTransform();
            // 标记发生了拖拽
            hasPanned = true;
        });

        document.addEventListener('mouseup', function() {
            if (isPanning) {
                isPanning = false;
                document.body.classList.remove('zoom-dragging');
                // 移除抓手光标
                if (imageCanvas) {
                    imageCanvas.classList.remove('grabbing-cursor');
                }
                // 恢复 zoom-in 光标
                if (zoomMode) {
                    imageCanvas.classList.add('zoom-cursor');
                }
            }
            // 重置拖拽标志
            hasPanned = false;
        });

        // 快捷键切换放大模式（z 键）
        document.addEventListener('keydown', function(e) {
            // 如果焦点在输入框中，不响应
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
                return;
            }

            // z 键切换放大模式
            if (e.key === 'z' || e.key === 'Z') {
                zoomMode = !zoomMode;
                if (zoomMode) {
                    document.body.classList.add('zoom-mode');
                    zoomBtn.classList.add('active');
                    zoomBtn.textContent = '✕';
                    zoomBtn.title = '关闭放大模式';
                } else {
                    document.body.classList.remove('zoom-mode');
                    zoomBtn.classList.remove('active');
                    zoomBtn.textContent = '🔍';
                    zoomBtn.title = '打开放大模式';
                }
            }

            // Ctrl+0 重置缩放
            if ((e.key === '0') && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                zoomLevel = 1;
                imageTranslate = { x: 0, y: 0 };
                updateZoomTransform();
            }
        });

    </script>
</body>
</html>
